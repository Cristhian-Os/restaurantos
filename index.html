<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA / Instalación -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RestaurantOS" />
    <meta name="theme-color" content="#FF5722" />
    <meta name="msapplication-TileColor" content="#FF5722" />
    <meta name="msapplication-TileImage" content="/icon-144x144.png" />

    <!-- Iconos -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-96x96.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icon-72x72.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-180x180.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icon-180x180.png" />

    <!-- SEO & Open Graph -->
    <title>RestaurantOS</title>
    <meta name="description" content="Sistema de gestión para restaurantes — punto de venta multi-rol con cocina, caja y menú digital." />
    <meta name="keywords" content="restaurante, POS, punto de venta, gestión, menú digital, caja" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="RestaurantOS" />
    <meta property="og:description" content="Sistema de gestión para restaurantes — punto de venta multi-rol." />
    <meta property="og:image" content="/icon-512x512.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="RestaurantOS" />
    <meta name="twitter:description" content="Sistema de gestión para restaurantes." />

    <!-- Fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Estilos críticos inline — previenen flash blanco en móvil -->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { background: #D8DAE4; }
      body {
        background-color: #D8DAE4 !important;
        font-family: 'Nunito', ui-sans-serif, system-ui, sans-serif;
        min-height: 100vh;
        min-height: 100dvh;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
        /* Safe area para notch iOS */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
      #root {
        min-height: 100vh;
        min-height: 100dvh;
        background-color: #D8DAE4;
      }
      /* Prevenir tap highlight azul en mobile */
      * { -webkit-tap-highlight-color: transparent; }
      img { max-width: 100%; display: block; }
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: #D8DAE4; }
      ::-webkit-scrollbar-thumb { background: rgba(140,150,175,0.5); border-radius: 4px; }
    </style>
  </head>
  <body>
    <!-- Limpieza de caché al cargar — garantiza versión fresca del SW -->
    <script>
      (function() {
        // Limpiar cachés viejos
        if ('caches' in window) {
          caches.keys().then(function(keys) {
            keys.forEach(function(key) {
              if (key !== 'ros-v5') caches.delete(key);
            });
          });
        }
      })();
    </script>

    <div id="root">
      <!-- Splash nativo — visible antes de que React cargue (0ms delay) -->
      <div id="native-splash" style="position:fixed;inset:0;background:#D8DAE4;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;font-family:Nunito,sans-serif;z-index:9999;">
        <div style="width:80px;height:80px;border-radius:1.25rem;overflow:hidden;flex-shrink:0;box-shadow:8px 8px 16px rgba(130,142,170,0.5),-8px -8px 16px rgba(255,255,255,0.5);background:#D8DAE4;">
          <img src="/logo.jpg" alt="RestaurantOS" style="width:100%;height:100%;object-fit:contain;display:block;" onerror="this.style.display='none'" />
        </div>
        <p style="color:#2D3561;font-weight:700;font-size:1.125rem;margin:0;">RestaurantOS</p>
        <div style="width:32px;height:32px;border-radius:50%;border:3px solid #CDD0DC;border-top-color:#FF5722;animation:rs 0.8s linear infinite;"></div>
        <style>@keyframes rs{to{transform:rotate(360deg)}}</style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
